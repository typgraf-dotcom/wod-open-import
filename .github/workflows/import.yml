name: Import quotidien wod-open.com

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC = 03:00 Paris (winter) / 04:00 (summer)
  workflow_dispatch:        # manual trigger from GitHub Actions tab

jobs:
  import:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Run scoring.fit import
        env:
          WP_APP_PASS:   ${{ secrets.WP_APP_PASS }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python daily_import.py

      - name: Run CompetitionCorner import
        env:
          WP_APP_PASS:   ${{ secrets.WP_APP_PASS }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python cc_import.py

      - name: Save results to repo
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add import_results.json cc_import_results.json competitions_raw.json
          git diff --staged --quiet || git commit -m "Auto: import $(date +%Y-%m-%d)"
          git push

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
